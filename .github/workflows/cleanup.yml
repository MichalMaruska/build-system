on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight

jobs:
  delete-old-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 10 # Keep only the 10 most recent releases
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
